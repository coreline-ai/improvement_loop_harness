schema_version: '1.0'
id: skill-loop-sku-normalization
title: SKU normalization trims and uppercases values
objective: Fix only SKU normalization so values are trimmed and uppercased, and add a regression test that fails on the current base commit and passes on the candidate.
base_branch: main
risk_area: none
write_scope:
