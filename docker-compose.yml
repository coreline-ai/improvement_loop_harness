services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vibeloop
      POSTGRES_PASSWORD: vibeloop
      POSTGRES_DB: vibeloop
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibeloop -d vibeloop"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - vibeloop-postgres-data:/var/lib/postgresql/data
volumes:
  vibeloop-postgres-data:
