services:
  gitea:
    image: gitea/gitea:1.24
    container_name: vibeloop-local-gitea
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__DOMAIN: 127.0.0.1
      GITEA__server__ROOT_URL: http://127.0.0.1:${VIBELOOP_GITEA_HTTP_PORT:-13000}/
      GITEA__server__SSH_DOMAIN: 127.0.0.1
      GITEA__server__SSH_PORT: "${VIBELOOP_GITEA_SSH_PORT:-12222}"
      GITEA__server__SSH_LISTEN_PORT: "22"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__security__INSTALL_LOCK: "true"
    ports:
      - "127.0.0.1:${VIBELOOP_GITEA_HTTP_PORT:-13000}:3000"
      - "127.0.0.1:${VIBELOOP_GITEA_SSH_PORT:-12222}:22"
    volumes:
      - gitea-data:/data
    restart: unless-stopped

volumes:
  gitea-data:
