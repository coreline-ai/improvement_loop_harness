name: Real Project Repair Evidence

on:
  workflow_dispatch:
    inputs:
      run_live:
        description: Run the live real-project repair evidence job.
        required: true
        type: boolean
        default: false
      repair_mode:
        description: Repair lane to execute.
        required: true
        type: choice
        default: existing-source
        options:
          - existing-source
          - semantic-source
          - business-fixture
      runner_label:
        description: Runner label with Codex ChatGPT login available.
        required: true
        type: string
        default: ubuntu-latest
      include_current_repo:
        description: Include the checked-out improvement_loop_harness repo as one corpus cell.
        required: true
        type: boolean
        default: true
      secondary_repo:
        description: OWNER/REPO or URL for a second real git repo accessible to this run.
        required: false
        type: string
        default: ''
      secondary_repo_ref:
        description: Optional branch, tag, or SHA for secondary_repo.
        required: false
        type: string
        default: ''
      additional_repos:
        description: Optional newline- or comma-separated OWNER/REPO or URL entries for broad corpus cells.
        required: false
        type: string
        default: ''
      min_repos:
        description: Minimum corpus repo count required by the live UAT.
        required: true
        type: string
        default: '2'
      publish_draft_prs:
        description: Publish each repaired temp clone to a private GitHub evidence repo and verify draft PRs.
        required: true
        type: boolean
        default: false
      github_owner:
        description: GitHub owner used for temporary private evidence repos when publish_draft_prs=true.
        required: true
        type: string
        default: coreline-ai
      github_repo_prefix:
        description: Prefix for temporary private evidence repos when publish_draft_prs=true.
        required: true
        type: string
        default: vibeloop-real-pr-ci
      keep_remote:
        description: Keep temporary private evidence repos after PR verification.
        required: true
        type: boolean
        default: false
      codex_model:
        description: Codex model used for the repair command.
        required: true
        type: string
        default: gpt-5.5
      codex_timeout_ms:
        description: Per-repo Codex repair timeout in milliseconds.
        required: true
        type: string
        default: '180000'
      replay_run_id:
        description: Optional existing run id to download and audit instead of running live.
        required: false
        type: string
        default: ''
      replay_run_attempt:
        description: Attempt for replay_run_id.
        required: false
        type: string
        default: '1'
      replay_repo:
        description: OWNER/REPO for replay artifacts.
        required: true
        type: string
        default: coreline-ai/improvement_loop_harness

permissions:
  actions: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  live-runner-preflight:
    name: live runner preflight
    if: ${{ inputs.run_live }}
    runs-on: ubuntu-latest
    outputs:
      can_run_live: ${{ steps.check.outputs.can_run_live }}
      status: ${{ steps.check.outputs.runner_preflight_status }}
      reason: ${{ steps.check.outputs.runner_preflight_reason }}
    env:
      GH_TOKEN: ${{ secrets.REAL_PROJECT_CORPUS_GH_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Check requested live runner availability
        id: check
        run: |
          mkdir -p .ci-live-runner-preflight
          node scripts/uat/ci-runner-preflight.mjs \
            --runner-label "${{ inputs.runner_label }}" \
            --repo "${{ github.repository }}" \
            --output .ci-live-runner-preflight/runner-preflight.json \
            --github-output "$GITHUB_OUTPUT"
          {
            echo "## Live runner preflight"
            echo
            echo '```json'
            cat .ci-live-runner-preflight/runner-preflight.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: real-project-live-runner-preflight-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-live-runner-preflight
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14

  live-evidence:
    name: live real project repair evidence
    if: ${{ inputs.run_live && needs.live-runner-preflight.outputs.can_run_live == 'true' }}
    needs: [live-runner-preflight]
    runs-on: ${{ inputs.runner_label }}
    env:
      GH_TOKEN: ${{ secrets.REAL_PROJECT_CORPUS_GH_TOKEN || github.token }}
      VIBELOOP_UAT_EVIDENCE_DIR: ${{ github.workspace }}/.uat-evidence-real-project-repair
      VIBELOOP_REAL_PROJECT_CODEX_MODEL: ${{ inputs.codex_model }}
      VIBELOOP_REAL_PROJECT_CODEX_TIMEOUT_MS: ${{ inputs.codex_timeout_ms }}
      VIBELOOP_REAL_PROJECT_GITHUB_OWNER: ${{ inputs.github_owner }}
      VIBELOOP_REAL_PROJECT_GITHUB_REPO_PREFIX: ${{ inputs.github_repo_prefix }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.29.3
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm exec prisma generate
      - run: corepack pnpm build
      - name: Check Codex login
        run: |
          codex --version
          codex -c service_tier=fast login status
      - name: Prepare real project corpus repos
        env:
          INCLUDE_CURRENT_REPO: ${{ inputs.include_current_repo }}
          SECONDARY_REPO: ${{ inputs.secondary_repo }}
          SECONDARY_REPO_REF: ${{ inputs.secondary_repo_ref }}
          ADDITIONAL_REPOS: ${{ inputs.additional_repos }}
        run: |
          repo_root="${RUNNER_TEMP}/vibeloop-real-project-corpus"
          repo_list="${RUNNER_TEMP}/vibeloop-real-project-corpus.txt"
          rm -rf "${repo_root}"
          mkdir -p "${repo_root}"
          : > "${repo_list}"

          add_repo_path() {
            local repo_path="$1"
            if [ -n "${repo_path}" ]; then
              printf '%s\n' "${repo_path}" >> "${repo_list}"
            fi
          }

          clone_repo_spec() {
            local repo_spec="$1"
            local clone_ref="${2:-}"
            local index="$3"
            local safe_name
            safe_name="$(printf '%s' "${repo_spec}" | sed 's#/*$##' | sed 's#.*[:/]##' | tr -c 'A-Za-z0-9._-' '-')"
            local clone_dir="${repo_root}/${index}-${safe_name}"
            if [[ "${repo_spec}" == http://* || "${repo_spec}" == https://* || "${repo_spec}" == git@* ]]; then
              if [ -n "${clone_ref}" ]; then
                git clone --depth 1 --branch "${clone_ref}" "${repo_spec}" "${clone_dir}"
              else
                git clone --depth 1 "${repo_spec}" "${clone_dir}"
              fi
            else
              if [ -n "${clone_ref}" ]; then
                gh repo clone "${repo_spec}" "${clone_dir}" -- --depth 1 --branch "${clone_ref}"
              else
                gh repo clone "${repo_spec}" "${clone_dir}" -- --depth 1
              fi
            fi
            add_repo_path "${clone_dir}"
          }

          if [ "${INCLUDE_CURRENT_REPO}" = "true" ]; then
            add_repo_path "${GITHUB_WORKSPACE}"
          fi

          repo_index=1
          if [ -n "${SECONDARY_REPO}" ]; then
            clone_repo_spec "${SECONDARY_REPO}" "${SECONDARY_REPO_REF}" "${repo_index}"
            repo_index=$((repo_index + 1))
          fi

          while IFS= read -r repo_spec; do
            repo_spec="$(printf '%s' "${repo_spec}" | xargs)"
            if [ -z "${repo_spec}" ]; then
              continue
            fi
            clone_repo_spec "${repo_spec}" "" "${repo_index}"
            repo_index=$((repo_index + 1))
          done < <(printf '%s\n' "${ADDITIONAL_REPOS}" | tr ',' '\n')

          repo_count="$(wc -l < "${repo_list}" | xargs)"
          if [ "${repo_count}" -eq 0 ]; then
            echo "At least one corpus repo is required when run_live=true" >&2
            exit 20
          fi
          echo "Prepared ${repo_count} corpus repo(s):"
          cat "${repo_list}"
          echo "VIBELOOP_REAL_PROJECT_REPO_LIST=${repo_list}" >> "${GITHUB_ENV}"
      - name: Run live real project repair corpus
        env:
          REPAIR_MODE: ${{ inputs.repair_mode }}
          PUBLISH_DRAFT_PRS: ${{ inputs.publish_draft_prs }}
          KEEP_REMOTE: ${{ inputs.keep_remote }}
          MIN_REPOS: ${{ inputs.min_repos }}
        run: |
          if [ "${REPAIR_MODE}" = "business-fixture" ]; then
            if [ "${PUBLISH_DRAFT_PRS}" = "true" ]; then
              echo "publish_draft_prs=true is only supported with repair_mode=existing-source" >&2
              exit 20
            fi
            scenario="repo-matrix-real-project-business-repair-uat"
            script="uat:repo-matrix:real-project-business-repair"
            extra_args=()
          elif [ "${REPAIR_MODE}" = "semantic-source" ]; then
            if [ "${PUBLISH_DRAFT_PRS}" = "true" ]; then
              echo "publish_draft_prs=true is only supported with repair_mode=existing-source" >&2
              exit 20
            fi
            if [ "${MIN_REPOS}" -lt 11 ]; then
              echo "repair_mode=semantic-source requires min_repos >= 11 for broad semantic corpus evidence" >&2
              exit 20
            fi
            scenario="repo-matrix-real-project-semantic-source-repair-uat"
            script="uat:repo-matrix:real-project-semantic-source-repair"
            extra_args=()
          elif [ "${PUBLISH_DRAFT_PRS}" = "true" ]; then
            scenario="repo-matrix-real-project-existing-source-repair-pr-uat"
            script="uat:repo-matrix:real-project-existing-source-repair-pr"
            extra_args=(--github-owner "${VIBELOOP_REAL_PROJECT_GITHUB_OWNER}" --github-repo-prefix "${VIBELOOP_REAL_PROJECT_GITHUB_REPO_PREFIX}")
            if [ "${KEEP_REMOTE}" = "true" ]; then
              extra_args+=(--keep-remote)
            fi
          else
            scenario="repo-matrix-real-project-existing-source-repair-uat"
            script="uat:repo-matrix:real-project-existing-source-repair"
            extra_args=()
          fi

          echo "VIBELOOP_REAL_PROJECT_REPAIR_SCENARIO=${scenario}" >> "${GITHUB_ENV}"
          repo_args=()
          while IFS= read -r repo_path; do
            if [ -n "${repo_path}" ]; then
              repo_args+=(--repo "${repo_path}")
            fi
          done < "${VIBELOOP_REAL_PROJECT_REPO_LIST}"

          corepack pnpm "${script}" -- \
            "${repo_args[@]}" \
            --min-repos "${MIN_REPOS}" \
            --codex-model "${VIBELOOP_REAL_PROJECT_CODEX_MODEL}" \
            --codex-timeout-ms "${VIBELOOP_REAL_PROJECT_CODEX_TIMEOUT_MS}" \
            "${extra_args[@]}"
      - run: corepack pnpm uat:release-evidence-audit -- --scenario "${VIBELOOP_REAL_PROJECT_REPAIR_SCENARIO}"
      - name: Upload business repair evidence
        if: ${{ always() && inputs.repair_mode == 'business-fixture' }}
        uses: actions/upload-artifact@v4
        with:
          name: real-project-business-repair-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .uat-evidence-real-project-repair
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14
      - name: Upload existing-source repair evidence
        if: ${{ always() && inputs.repair_mode == 'existing-source' && !inputs.publish_draft_prs }}
        uses: actions/upload-artifact@v4
        with:
          name: real-project-existing-source-repair-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .uat-evidence-real-project-repair
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14
      - name: Upload semantic-source repair evidence
        if: ${{ always() && inputs.repair_mode == 'semantic-source' }}
        uses: actions/upload-artifact@v4
        with:
          name: real-project-semantic-source-repair-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .uat-evidence-real-project-repair
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14
      - name: Upload existing-source repair PR evidence
        if: ${{ always() && inputs.repair_mode == 'existing-source' && inputs.publish_draft_prs }}
        uses: actions/upload-artifact@v4
        with:
          name: real-project-existing-source-repair-pr-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .uat-evidence-real-project-repair
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14

  live-artifact-audit:
    name: audit live real project repair artifact
    if: ${{ always() && inputs.run_live }}
    runs-on: ubuntu-latest
    needs: [live-runner-preflight, live-evidence]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Download live runner preflight
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: real-project-live-runner-preflight-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-real-project-runner-preflight
          merge-multiple: true
      - name: Download business repair evidence
        if: ${{ inputs.repair_mode == 'business-fixture' }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: real-project-business-repair-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-real-project-repair-evidence
          merge-multiple: true
      - name: Download existing-source repair evidence
        if: ${{ inputs.repair_mode == 'existing-source' && !inputs.publish_draft_prs }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: real-project-existing-source-repair-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-real-project-repair-evidence
          merge-multiple: true
      - name: Download semantic-source repair evidence
        if: ${{ inputs.repair_mode == 'semantic-source' }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: real-project-semantic-source-repair-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-real-project-repair-evidence
          merge-multiple: true
      - name: Download existing-source repair PR evidence
        if: ${{ inputs.repair_mode == 'existing-source' && inputs.publish_draft_prs }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: real-project-existing-source-repair-pr-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-real-project-repair-evidence
          merge-multiple: true
      - name: Audit downloaded real project repair evidence
        env:
          REPAIR_MODE: ${{ inputs.repair_mode }}
          PUBLISH_DRAFT_PRS: ${{ inputs.publish_draft_prs }}
          RUNNER_PREFLIGHT_CAN_RUN_LIVE: ${{ needs.live-runner-preflight.outputs.can_run_live }}
          RUNNER_PREFLIGHT_REASON: ${{ needs.live-runner-preflight.outputs.reason }}
        run: |
          if [ "${REPAIR_MODE}" = "business-fixture" ]; then
            scenario="repo-matrix-real-project-business-repair-uat"
          elif [ "${REPAIR_MODE}" = "semantic-source" ]; then
            scenario="repo-matrix-real-project-semantic-source-repair-uat"
          elif [ "${PUBLISH_DRAFT_PRS}" = "true" ]; then
            scenario="repo-matrix-real-project-existing-source-repair-pr-uat"
          else
            scenario="repo-matrix-real-project-existing-source-repair-uat"
          fi
          runner_preflight_file=".ci-real-project-runner-preflight/runner-preflight.json"
          if [ -f "${runner_preflight_file}" ]; then
            echo "Runner preflight:"
            cat "${runner_preflight_file}"
          fi
          if [ "${RUNNER_PREFLIGHT_CAN_RUN_LIVE}" != "true" ]; then
            mkdir -p .ci-real-project-repair-audit .ci-real-project-runner-preflight
            if [ ! -f "${runner_preflight_file}" ]; then
              printf '{"status":"blocked","can_run_live":false,"reason":"%s"}\n' "${RUNNER_PREFLIGHT_REASON:-LIVE_RUNNER_PREFLIGHT_BLOCKED}" > "${runner_preflight_file}"
            fi
            node scripts/uat/ci-live-runner-block-audit.mjs \
              --preflight-file "${runner_preflight_file}" \
              --output .ci-real-project-repair-audit/release-evidence-audit.json \
              --workflow-name "Real Project Repair Evidence" \
              --evidence-scenario "${scenario}" \
              --run-id "${GITHUB_RUN_ID}" \
              --run-attempt "${GITHUB_RUN_ATTEMPT}"
            exit "$?"
          fi
          mkdir -p .ci-real-project-repair-audit
          set +e
          node scripts/uat/release-evidence-audit.mjs \
            --evidence-root .ci-real-project-repair-evidence \
            --scenario "${scenario}" \
            > .ci-real-project-repair-audit/release-evidence-audit.json \
            2> .ci-real-project-repair-audit/release-evidence-audit.stderr
          status=$?
          cat .ci-real-project-repair-audit/release-evidence-audit.json
          if [ -s .ci-real-project-repair-audit/release-evidence-audit.stderr ]; then
            cat .ci-real-project-repair-audit/release-evidence-audit.stderr >&2
          fi
          exit "$status"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: real-project-repair-artifact-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-real-project-repair-audit
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14

  replay-artifact-audit:
    name: replay real project repair artifact audit
    if: ${{ inputs.replay_run_id != '' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Download and audit real project repair evidence from a prior run
        env:
          REPAIR_MODE: ${{ inputs.repair_mode }}
          PUBLISH_DRAFT_PRS: ${{ inputs.publish_draft_prs }}
        run: |
          if [ "${REPAIR_MODE}" = "business-fixture" ]; then
            scenario="repo-matrix-real-project-business-repair-uat"
            artifact_pattern="real-project-business-repair-evidence-${{ inputs.replay_run_id }}-${{ inputs.replay_run_attempt }}"
          elif [ "${REPAIR_MODE}" = "semantic-source" ]; then
            scenario="repo-matrix-real-project-semantic-source-repair-uat"
            artifact_pattern="real-project-semantic-source-repair-evidence-${{ inputs.replay_run_id }}-${{ inputs.replay_run_attempt }}"
          elif [ "${PUBLISH_DRAFT_PRS}" = "true" ]; then
            scenario="repo-matrix-real-project-existing-source-repair-pr-uat"
            artifact_pattern="real-project-existing-source-repair-pr-evidence-${{ inputs.replay_run_id }}-${{ inputs.replay_run_attempt }}"
          else
            scenario="repo-matrix-real-project-existing-source-repair-uat"
            artifact_pattern="real-project-existing-source-repair-evidence-${{ inputs.replay_run_id }}-${{ inputs.replay_run_attempt }}"
          fi
          node scripts/uat/release-evidence-audit-gh.mjs \
            --run-id "${{ inputs.replay_run_id }}" \
            --run-attempt "${{ inputs.replay_run_attempt }}" \
            --repo "${{ inputs.replay_repo }}" \
            --artifact-pattern "${artifact_pattern}" \
            --scenario "${scenario}"
