name: P4 Real Reviewer Live Evidence

on:
  workflow_dispatch:
    inputs:
      run_live:
        description: Run the live P4 real Codex reviewer evidence job.
        required: true
        type: boolean
        default: false
      runner_label:
        description: Runner label with Docker and Codex ChatGPT login available.
        required: true
        type: string
        default: ubuntu-latest
      reviewer_model:
        description: Codex reviewer model.
        required: true
        type: string
        default: gpt-5.5
      reviewer_timeout_ms:
        description: Reviewer command timeout in milliseconds.
        required: true
        type: string
        default: '240000'
      replay_run_id:
        description: Optional existing run id to download and audit instead of running live.
        required: false
        type: string
        default: ''
      replay_run_attempt:
        description: Attempt for replay_run_id.
        required: false
        type: string
        default: '1'
      replay_repo:
        description: OWNER/REPO for replay artifacts.
        required: true
        type: string
        default: coreline-ai/improvement_loop_harness

permissions:
  actions: read
  contents: read

jobs:
  live-evidence:
    name: live P4 real reviewer evidence
    if: ${{ inputs.run_live }}
    runs-on: ${{ inputs.runner_label }}
    env:
      VIBELOOP_UAT_EVIDENCE_DIR: ${{ github.workspace }}/.uat-evidence-adversary-real
      VIBELOOP_ADVERSARY_LIVE_SCENARIO: adversary-live-real-reviewer-uat
      VIBELOOP_ADVERSARY_REVIEWER_COMMAND: node scripts/uat/adversary-live-codex-reviewer.mjs --live
      VIBELOOP_ADVERSARY_REVIEWER_PROVIDER: codex
      VIBELOOP_ADVERSARY_REVIEWER_REAL_LLM: '1'
      VIBELOOP_ADVERSARY_REVIEWER_TIMEOUT_MS: ${{ inputs.reviewer_timeout_ms }}
      VIBELOOP_ADVERSARY_LIVE_REVIEWER_MODEL: ${{ inputs.reviewer_model }}
      VIBELOOP_ADVERSARY_LIVE_REVIEWER_TIMEOUT_MS: ${{ inputs.reviewer_timeout_ms }}
      VIBELOOP_ADVERSARY_BUILDER_AGENT_SPEC: mock:adversary-live-controlled
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.29.3
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm build
      - run: docker pull node:22-alpine
      - name: Configure Docker-shareable P4 work root
        run: |
          work_root="$HOME/.vibeloop/uat-worktrees-actions/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$work_root"
          echo "VIBELOOP_ADVERSARY_LIVE_WORK_ROOT=$work_root" >> "$GITHUB_ENV"
          echo "P4 work root: $work_root"
      - name: Check Codex reviewer login
        run: |
          codex --version
          codex -c service_tier=fast login status
      - run: pnpm uat:adversary-live
      - run: pnpm uat:release-evidence-audit -- --scenario adversary-live-real-reviewer-uat
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: adversary-real-reviewer-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .uat-evidence-adversary-real
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14
      - name: Cleanup P4 work root
        if: always()
        run: |
          if [ -n "${VIBELOOP_ADVERSARY_LIVE_WORK_ROOT:-}" ]; then
            rm -rf "$VIBELOOP_ADVERSARY_LIVE_WORK_ROOT"
          fi

  live-artifact-audit:
    name: audit live P4 real reviewer artifact
    if: ${{ always() && inputs.run_live }}
    runs-on: ubuntu-latest
    needs: [live-evidence]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: adversary-real-reviewer-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-adversary-real-reviewer-evidence
          merge-multiple: true
      - name: Audit downloaded P4 real reviewer evidence
        run: |
          mkdir -p .ci-adversary-real-reviewer-audit
          set +e
          node scripts/uat/release-evidence-audit.mjs \
            --evidence-root .ci-adversary-real-reviewer-evidence \
            --scenario adversary-live-real-reviewer-uat \
            > .ci-adversary-real-reviewer-audit/release-evidence-audit.json \
            2> .ci-adversary-real-reviewer-audit/release-evidence-audit.stderr
          status=$?
          cat .ci-adversary-real-reviewer-audit/release-evidence-audit.json
          if [ -s .ci-adversary-real-reviewer-audit/release-evidence-audit.stderr ]; then
            cat .ci-adversary-real-reviewer-audit/release-evidence-audit.stderr >&2
          fi
          exit "$status"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: adversary-real-reviewer-artifact-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-adversary-real-reviewer-audit
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14

  replay-artifact-audit:
    name: replay P4 real reviewer artifact audit
    if: ${{ inputs.replay_run_id != '' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Download and audit P4 real reviewer evidence from a prior run
        run: |
          node scripts/uat/release-evidence-audit-gh.mjs \
            --run-id "${{ inputs.replay_run_id }}" \
            --run-attempt "${{ inputs.replay_run_attempt }}" \
            --repo "${{ inputs.replay_repo }}" \
            --artifact-pattern "adversary-real-reviewer-evidence-${{ inputs.replay_run_id }}-${{ inputs.replay_run_attempt }}" \
            --scenario adversary-live-real-reviewer-uat
