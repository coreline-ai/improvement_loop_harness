schema_version: '1.0'
project: python-project
protected_paths:
  - .env
  - .env.*
  - eval.yaml
risk_classification:
  none:
    - src/
    - tests/
  eval_system:
    - eval.yaml
limits:
  max_changed_files: 6
  max_changed_lines: 200
  agent_timeout_seconds: 300
test_integrity:
  forbidden_patterns:
    - pytest.mark.skip
    - unittest.skip
  suspicious_patterns:
    - assert True
# Deterministic improvement-quality gate (M0). With `required: true`, a PR
# candidate needs verified ∧ qualified (quality.met). Omit this block to treat
# quality as always met. Fixed-rule thresholds — never an LLM judgment.
evaluator:
  required: true
  min_evidence_present: 1
  max_changed_files: 6
  max_changed_lines: 200
  forbid_protected: true
  # target_paths:            # optional: restrict the accepted fix to these files
  #   - src/your_module.py
gates:
  - name: git_meta_integrity
    type: integrity
    command: builtin:git-meta-integrity
    required: true
  - name: protected_files
    type: scope
    command: builtin:protected-files
    required: true
  - name: diff_scope
    type: scope
    command: builtin:diff-scope
    required: true
  - name: limits
    type: integrity
    command: builtin:limits
    required: true
  - name: test_integrity
    type: integrity
    command: builtin:test-integrity
    required: true
  - name: python_tests
    type: task_acceptance
    group: pass_to_pass
    command: python -m pytest
    required: true
  - name: advisory_static
    type: advisory
    command: python -c "raise SystemExit(0)"
    required: false
