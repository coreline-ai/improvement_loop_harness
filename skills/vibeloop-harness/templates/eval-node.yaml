schema_version: '1.0'
project: node-project
protected_paths:
  - .env
  - .env.*
  - package-lock.json
  - pnpm-lock.yaml
  - eval.yaml
risk_classification:
  none:
    - src/
    - tests/
  eval_system:
    - eval.yaml
limits:
  max_changed_files: 6
  max_changed_lines: 200
  agent_timeout_seconds: 300
test_integrity:
  forbidden_patterns:
    - test.skip
    - it.only
    - describe.only
  suspicious_patterns:
    - expect(true).toBe(true)
# Deterministic improvement-quality gate (M0). With `required: true`, a PR
# candidate needs verified ∧ qualified (quality.met). Omit this block to treat
# quality as always met. Fixed-rule thresholds — never an LLM judgment.
evaluator:
  required: true
  min_evidence_present: 1
  max_changed_files: 6
  max_changed_lines: 200
  forbid_protected: true
  # target_paths:            # optional: restrict the accepted fix to these files
  #   - src/your-module.ts
  # Optional Q5 fixed metric deltas. These require project gates to emit
  # coverage/latency/security/duplicate metrics through stdout or
  # VIBELOOP_METRICS_FILE. Missing configured metrics fail closed.
  # min_coverage_delta: 0
  # max_latency_regression_ms: 25
  # max_security_findings_delta: 0
  # max_critical_security_findings_delta: 0
  # max_duplicate_score_delta: 0
# Optional: redact/reject context or secret leaks in agent stdout/stderr.
# token_like reject is opt-in (false-positive risk); leave it off by default.
# scan_patch also rejects (no redaction) when the candidate patch contains a
# forbidden literal — the patch is the PR deliverable. Add a builtin:artifact-leak
# gate to make any of these reject.
# artifact_leak:
#   scan_agent_stdout: true
#   scan_agent_stderr: true
#   scan_patch: true          # reject if the patch leaks a marker/secret
#   redact_gate_logs: true    # redact-only the project gate stdout/stderr logs
#   forbidden_literals:
#     - label: prior_issue_id
#       value: REPLACE_WITH_A_RECOVERABLE_MARKER
gates:
  - name: git_meta_integrity
    type: integrity
    command: builtin:git-meta-integrity
    required: true
  - name: protected_files
    type: scope
    command: builtin:protected-files
    required: true
  - name: diff_scope
    type: scope
    command: builtin:diff-scope
    required: true
  - name: limits
    type: integrity
    command: builtin:limits
    required: true
  - name: test_integrity
    type: integrity
    command: builtin:test-integrity
    required: true
  - name: node_tests
    type: task_acceptance
    group: pass_to_pass
    command: npm test
    required: true
  - name: advisory_static
    type: advisory
    command: node -e "process.exit(0)"
    required: false
