schema_version: '1.0'
project: node-project
protected_paths:
  - .env
  - .env.*
  - package-lock.json
  - pnpm-lock.yaml
  - eval.yaml
risk_classification:
  none:
    - src/
    - tests/
  eval_system:
    - eval.yaml
limits:
  max_changed_files: 6
  max_changed_lines: 200
  agent_timeout_seconds: 300
test_integrity:
  forbidden_patterns:
    - test.skip
    - it.only
    - describe.only
  suspicious_patterns:
    - expect(true).toBe(true)
gates:
  - name: git_meta_integrity
    type: integrity
    command: builtin:git-meta-integrity
    required: true
  - name: protected_files
    type: scope
    command: builtin:protected-files
    required: true
  - name: diff_scope
    type: scope
    command: builtin:diff-scope
    required: true
  - name: limits
    type: integrity
    command: builtin:limits
    required: true
  - name: test_integrity
    type: integrity
    command: builtin:test-integrity
    required: true
  - name: node_tests
    type: task_acceptance
    group: pass_to_pass
    command: npm test
    required: true
  - name: advisory_static
    type: advisory
    command: node -e "process.exit(0)"
    required: false
