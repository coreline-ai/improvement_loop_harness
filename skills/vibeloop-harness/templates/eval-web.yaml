schema_version: '1.0'
project: web-project
protected_paths:
  - .env
  - .env.*
  - eval.yaml
  - playwright/.auth
risk_classification:
  none:
    - src/
    - app/
    - components/
    - tests/
  ui:
    - app/
    - components/
  eval_system:
    - eval.yaml
limits:
  max_changed_files: 8
  max_changed_lines: 260
  agent_timeout_seconds: 420
test_integrity:
  forbidden_patterns:
    - test.skip
    - test.only
    - it.only
  suspicious_patterns:
    - expect(true).toBe(true)
# Deterministic improvement-quality gate (M0). With `required: true`, a PR
# candidate needs verified ∧ qualified (quality.met). Omit this block to treat
# quality as always met. Fixed-rule thresholds — never an LLM judgment.
evaluator:
  required: true
  min_evidence_present: 1
  max_changed_files: 8
  max_changed_lines: 260
  forbid_protected: true
  # target_paths:            # optional: restrict the accepted fix to these files
  #   - components/your-component.tsx
  # Optional Q5 fixed metric deltas. These require project gates to emit
  # coverage/latency/security/duplicate metrics through stdout or
  # VIBELOOP_METRICS_FILE. Missing configured metrics fail closed.
  # min_coverage_delta: 0
  # max_latency_regression_ms: 25
  # max_security_findings_delta: 0
  # max_critical_security_findings_delta: 0
  # max_duplicate_score_delta: 0
gates:
  - name: git_meta_integrity
    type: integrity
    command: builtin:git-meta-integrity
    required: true
  - name: protected_files
    type: scope
    command: builtin:protected-files
    required: true
  - name: diff_scope
    type: scope
    command: builtin:diff-scope
    required: true
  - name: limits
    type: integrity
    command: builtin:limits
    required: true
  - name: test_integrity
    type: integrity
    command: builtin:test-integrity
    required: true
  - name: web_unit_tests
    type: task_acceptance
    group: pass_to_pass
    command: npm test
    required: true
  - name: web_build
    type: regression
    group: pass_to_pass
    command: npm run build
    required: true
  - name: advisory_static
    type: advisory
    command: node -e "process.exit(0)"
    required: false
