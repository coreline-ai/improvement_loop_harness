schema_version: '1.0'
project: web-project
protected_paths:
  - .env
  - .env.*
  - eval.yaml
  - playwright/.auth
risk_classification:
  none:
    - src/
    - app/
    - components/
    - tests/
  ui:
    - app/
    - components/
  eval_system:
    - eval.yaml
limits:
  max_changed_files: 8
  max_changed_lines: 260
  agent_timeout_seconds: 420
test_integrity:
  forbidden_patterns:
    - test.skip
    - test.only
    - it.only
  suspicious_patterns:
    - expect(true).toBe(true)
gates:
  - name: git_meta_integrity
    type: integrity
    command: builtin:git-meta-integrity
    required: true
  - name: protected_files
    type: scope
    command: builtin:protected-files
    required: true
  - name: diff_scope
    type: scope
    command: builtin:diff-scope
    required: true
  - name: limits
    type: integrity
    command: builtin:limits
    required: true
  - name: test_integrity
    type: integrity
    command: builtin:test-integrity
    required: true
  - name: web_unit_tests
    type: task_acceptance
    group: pass_to_pass
    command: npm test
    required: true
  - name: web_build
    type: regression
    group: pass_to_pass
    command: npm run build
    required: true
  - name: advisory_static
    type: advisory
    command: node -e "process.exit(0)"
    required: false
